name: CI — Python Microservices

on:
  push:
    branches: [main]
    paths: ["services/**", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main]
    paths: ["services/**", ".github/workflows/ci.yml"]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.10"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.10"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov --cov-report=term-missing --cov-fail-under=80
