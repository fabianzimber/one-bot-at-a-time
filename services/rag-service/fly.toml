# fly.toml — RAG Service
# Deploy with: fly deploy --config fly.toml
#
# Required secrets (set via `fly secrets set KEY=value`):
#   OPENAI_API_KEY   — OpenAI API key
#   RAG_CHROMA_HOST  — ChromaDB host (e.g. internal Fly.io private network hostname)
#   RAG_CHROMA_PORT  — ChromaDB port (default: 8000)
#   CORS_ORIGINS     — JSON array of allowed origins, e.g. '["https://yourapp.fly.dev"]'
#
# Volume:
#   Create once with: fly volumes create document_storage --region fra --size 1

app = 'trenkwalder-rag-service'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'
  build-context = '..'

[env]
  RAG_EMBEDDING_MODEL = 'text-embedding-3-small'
  LOG_LEVEL = 'INFO'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.checks]
    [http_service.checks.health]
      grace_period = '10s'
      interval = '30s'
      method = 'GET'
      path = '/health'
      timeout = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'document_storage'
  destination = '/data/documents'
