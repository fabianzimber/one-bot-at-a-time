# fly.toml — Chat Orchestrator
# Deploy with: fly deploy --config fly.toml
#
# Required secrets (set via `fly secrets set KEY=value`):
#   OPENAI_API_KEY        — OpenAI API key
#   CHAT_REDIS_URL        — Redis connection URL (e.g. from Upstash)
#   CHAT_RAG_SERVICE_URL  — Internal URL of the deployed RAG service
#   CHAT_HR_SERVICE_URL   — Internal URL of the deployed HR service
#   CORS_ORIGINS          — JSON array of allowed origins, e.g. '["https://yourapp.fly.dev"]'

app = 'trenkwalder-chat-orchestrator'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'
  build-context = '..'

[env]
  CHAT_LLM_MODEL = 'gpt-4o'
  CHAT_LLM_FALLBACK_MODEL = 'gpt-4o-mini'
  CHAT_LLM_EMERGENCY_MODEL = 'gpt-3.5-turbo'
  LOG_LEVEL = 'INFO'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.checks]
    [http_service.checks.health]
      grace_period = '10s'
      interval = '30s'
      method = 'GET'
      path = '/health'
      timeout = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
